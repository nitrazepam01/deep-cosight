<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co-Sight 超级智能体</title>
    <link rel="icon" href="favicon.ico">

    <script src="libs/d3.v7.min.js"></script>
    <link href="libs/fontawesome-6.7.2/css/all.min.css" rel="stylesheet">

    <!-- Markdown 渲染样式 -->
    <link rel="stylesheet" href="markdown/markdown.css" />
    <link rel="stylesheet" href="styles/styles-new.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar-left" id="sidebar-left">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <span class="logo-text">Co-Sight</span>
                </div>
                <button class="btn-collapse-sidebar" id="collapse-left-btn" title="收起侧边栏">
                    <i class="fas fa-indent" style="transform: rotate(180deg);"></i>
                </button>
            </div>
            
            <div class="thread-section">
                <div class="section-header">
                    <span class="section-title">线程</span>
                    <div class="section-actions">
                        <button class="btn-icon-small" id="new-thread-btn" title="新建线程">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="btn-icon-small" id="new-folder-btn" title="新建文件夹">
                            <i class="fas fa-folder-plus"></i>
                        </button>
                    </div>
                </div>
                
                <div class="folder-list" id="folder-list"></div>
            </div>
            
            <div class="sidebar-footer">
                <button class="btn-settings" id="settings-btn" title="设置">
                    <i class="fas fa-cog"></i>
                    <span>设置</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="main-header">
                <div class="sidebar-expand-btn-wrapper">
                    <button class="sidebar-expand-btn" id="sidebar-expand-btn" title="展开侧边栏">
                        <i class="fas fa-indent"></i>
                    </button>
                    <button class="new-chat-bubble-btn" id="new-chat-bubble-btn" title="新建聊天">
                        <i class="fas fa-comment-dots"></i>
                    </button>
                </div>
                
                <div class="main-title">
                    <h2 id="conversation-title">新对话</h2>
                    <button class="rename-title-btn" id="rename-title-btn" title="重命名标题">
                        <i class="fas fa-pen"></i>
                    </button>
                </div>
                
                <div class="main-actions">
                    <button class="btn-icon" id="clear-chat-btn" title="清空对话">
                        <i class="fas fa-trash"></i>
                    </button>
                    <button class="btn-icon" id="export-chat-btn" title="导出对话">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>
            
            <div class="chat-container" id="chat-container">
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-content">
                        <div class="welcome-icon">
                            <i class="fas fa-robot"></i>
                        </div>
                        <h1 class="welcome-title">你好，</h1>
                        <p class="welcome-subtitle">今天有什么可以帮到你？</p>
                    </div>
                </div>
                
                <div class="message-list" id="message-list" style="display: none;"></div>
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <div class="file-preview-container" id="file-preview-container" style="display: none;">
                            <div class="file-preview-list" id="file-preview-list"></div>
                        </div>
                        
                        <textarea 
                            class="chat-input" 
                            id="chat-input" 
                            placeholder="请输入你的任务..."
                            rows="1"
                        ></textarea>
                        <div class="input-buttons">
                            <div class="input-buttons-left">
                                <button class="btn-input-action" id="upload-file-btn" title="上传文件">
                                    <i class="fas fa-paperclip"></i>
                                </button>
                                <button class="btn-input-action" id="knowledge-base-btn" title="知识库管理" onclick="KnowledgeService.open()">
                                    <i class="fas fa-book"></i>
                                </button>
                                <button class="btn-input-action" id="agent-base-btn" title="智能体配置" onclick="AgentRuntimeService.open()">
                                    <i class="fas fa-robot"></i>
                                </button>
                                <button class="btn-input-action" id="thinking-mode-btn" title="深度思考" onclick="toggleThinkingMode()">
                                    <i class="fas fa-brain"></i>
                                </button>
                            </div>
                            <button class="btn-send" id="send-btn">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 工具调用面板容器（与 index.html 保持一致） -->
        <div id="tool-call-panels-container"></div>
        
        <!-- 右侧内容面板（用于显示工具调用结果） -->
        <div class="right-container" id="right-container" style="display: none;">
            <div class="right-header">
                <h3><i class="fas fa-info-circle"></i> Co-Sight 的电脑</h3>
                <span id="right-container-status">正在查看文件内容...</span>
                <div class="right-header-icons">
                    <button class="btn-icon" id="toggle-maximize-btn" onclick="toggleMaximizePanel()">
                        <i class="fas fa-expand-alt"></i>
                    </button>
                    <button class="btn-icon" id="close-right-panel-btn" onclick="toggleRightContainer()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            <div class="right-content">
                <iframe id="content-iframe" width="100%" height="100%" frameborder="0"
                    style="display: none;"></iframe>
                <div id="markdown-content"></div>
                <div id="loading-indicator" class="loading-indicator" style="display: none;">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
        
        <aside class="sidebar-right" id="sidebar-right">
            <div class="sidebar-right-header">
                <div class="sidebar-right-title">
                    <i class="fas fa-project-diagram"></i>
                    <span id="execution-title">任务执行</span>
                </div>
                <div class="sidebar-right-actions">
                    <button class="btn-icon-small" id="expand-right-btn" title="展开/收起">
                        <i class="fas fa-expand-alt"></i>
                    </button>
                    <button class="btn-icon-small" id="close-right-btn" title="关闭">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <div class="sidebar-right-content">
                <div class="task-chain-section">
                    <div class="section-title-bar">
                        <span><i class="fas fa-sitemap"></i> 任务链</span>
                        <div class="section-title-actions">
                            <button class="btn-icon task-chain-reset-btn" id="dag-reset-view-btn" title="定位到初始视图">
                                <i class="fas fa-crosshairs"></i>
                            </button>
                        </div>
                    </div>
                    <div class="dag-wrapper">
                        <svg class="dag-svg" id="dag-svg">
                            <defs>
                                <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="25" refY="0" orient="auto"
                                    viewBox="0 -5 10 10">
                                    <path d="M0,-5L10,0L0,5" fill="#2f7de1" />
                                </marker>
                            </defs>
                        </svg>
                    </div>
                    <div class="progress-overview">
                        <div class="progress-stats">
                            <div class="stat-item completed">
                                <div class="stat-number" id="completed-count">0</div>
                                <div class="stat-label">已完成</div>
                            </div>
                            <div class="stat-item in-progress">
                                <div class="stat-number" id="in-progress-count">0</div>
                                <div class="stat-label">进行中</div>
                            </div>
                            <div class="stat-item blocked">
                                <div class="stat-number" id="blocked-count">0</div>
                                <div class="stat-label">阻塞</div>
                            </div>
                            <div class="stat-item not-started">
                                <div class="stat-number" id="not-started-count">0</div>
                                <div class="stat-label">未开始</div>
                            </div>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progress-fill"></div>
                            </div>
                            <span class="progress-text" id="progress-text">0%</span>
                        </div>
                    </div>
                </div>

                <div class="task-info-section" id="task-info-section">
                    <div class="section-title-bar">
                        <span id="task-info-title"><i class="fas fa-circle-info"></i> ????</span>
                        <div class="section-title-actions">
                            <span class="tool-count" id="tool-count">0</span>
                            <button class="btn-icon task-info-switch-btn" id="task-info-switch-btn" title="??????/????">
                                <i class="fas fa-arrows-rotate"></i>
                            </button>
                        </div>
                    </div>
                    <div class="task-info-body" id="task-info-body">
                        <div class="task-info-view" id="task-detail-view">
                            <div class="task-detail-content" id="task-detail-content">
                                <div class="task-detail-empty">??????</div>
                            </div>
                        </div>
                        <div class="task-info-view hidden" id="task-log-view">
                            <div class="tool-chain-list" id="tool-chain-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <div class="modal-overlay" id="folder-modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>新建文件夹</h3>
                <button class="btn-close-modal" id="close-folder-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <input type="text" class="modal-input" id="folder-name-input" placeholder="请输入文件夹名称">
            </div>
            <div class="modal-footer">
                <button class="btn-modal-secondary" id="cancel-folder-btn">取消</button>
                <button class="btn-modal-primary" id="confirm-folder-btn">确定</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="rename-modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>重命名线程</h3>
                <button class="btn-close-modal" id="close-rename-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <input type="text" class="modal-input" id="rename-input" placeholder="请输入线程名称">
            </div>
            <div class="modal-footer">
                <button class="btn-modal-secondary" id="cancel-rename-btn">取消</button>
                <button class="btn-modal-primary" id="confirm-rename-btn">确定</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="delete-confirm-modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>删除确认</h3>
                <button class="btn-close-modal" id="close-delete-confirm-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p class="modal-message" id="delete-confirm-message"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-secondary" id="cancel-delete-confirm-btn">取消</button>
                <button class="btn-modal-primary btn-delete-confirm" id="confirm-delete-confirm-btn">删除</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="delete-folder-confirm-modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>删除确认</h3>
                <button class="btn-close-modal" id="close-delete-folder-confirm-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p class="modal-message" id="delete-folder-confirm-message"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-secondary" id="cancel-delete-folder-confirm-btn">取消</button>
                <button class="btn-modal-primary btn-delete-confirm" id="confirm-delete-folder-confirm-btn">删除</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="clear-chat-confirm-modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>清空对话确认</h3>
                <button class="btn-close-modal" id="close-clear-chat-confirm-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p class="modal-message" id="clear-chat-confirm-message">确定要清空当前对话吗？此操作不可恢复。</p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-secondary" id="cancel-clear-chat-confirm-btn">取消</button>
                <button class="btn-modal-primary btn-delete-confirm" id="confirm-clear-chat-confirm-btn">清空</button>

    <!-- 知识库管理弹窗容器 -->

    <!-- 智能体管理弹窗容器 -->
    <div id="agent-modal"></div>

    <div class="tooltip" id="tooltip"></div>
    <div class="steps-tooltip" id="steps-tooltip"></div>
    <div class="verification-tooltip" id="verification-tooltip"></div>

    <script src="js/message.js"></script>

    <script src="js/steps.js"></script>
    <script src="js/dag.js"></script>
    <script src="js/custom-select.js"></script>
    <script src="js/des.js"></script>
    <script src="js/settings.js"></script>

    <script>
        // 页面加载时初始化知识库服务状态
        window.addEventListener('DOMContentLoaded', function() {
            if (typeof KnowledgeService !== 'undefined' && KnowledgeService.init) {
                KnowledgeService.init();
            }
        });
    </script>
    
    <!-- Markdown 渲染依赖（本地库文件） -->
    <link rel="stylesheet" href="markdown/src/dist/styles/github.min.css" />
    <script src="markdown/src/dist/markdown-it.min.js"></script>
    <script src="markdown/src/dist/markdown-it-task-lists.min.js"></script>

            tex: {
                inlineMath: [["$", "$"], ["\\(", "\\)"]],

            },

                fontURL: 'markdown/src/dist/mathjax/output/chtml/fonts/woff-v2/woff2',
                scale: 1.0
            },
            svg: {
                fontURL: 'markdown/src/dist/mathjax/output/svg/fonts/woff-v2/woff2',
                scale: 1.0
            }
        };
    </script>
    <script id="MathJax-script" async src="markdown/src/dist/mathjax/tex-mml-chtml.js"></script>
    
    <!-- Markdown 渲染器 -->
    <script src="markdown/markdown.js"></script>
    
    <script src="js/main-new.js"></script>
    
    <!-- 页面刷新时恢复状态 -->
    <script>
        (function restoreFromStorage() {
            try {
                const pendingRaw = localStorage.getItem('cosight:pendingRequests');
                const pendings = pendingRaw ? JSON.parse(pendingRaw) : {};
                const pendingTopics = Object.keys(pendings);

                if (pendingTopics.length === 0) return;

                // 先切换到主布局（隐藏初始输入区，显示中间容器），不发送新消息
                if (typeof hideInitialInputAndShowMain === 'function') {
                    hideInitialInputAndShowMain('');
                }

                // 等待 WebSocket 连接成功后，恢复订阅；仅在 stillPending===true 时重发
                const onWsConnected = () => {
                    try {
                        pendingTopics.forEach(topic => {
                            const item = pendings[topic];
                            if (!item) return;

                            // 包装一次性监听器：首次收到消息后，清除 pending 状态
                            const originalHandler = window.messageService && window.messageService.receiveMessage
                                ? window.messageService.receiveMessage
                                : () => { };
                            let firstMessageHandled = false;
                            const wrappedHandler = (evt) => {
                                if (!firstMessageHandled) {
                                    firstMessageHandled = true;
                                    try {
                                        const latestPendingsRaw = localStorage.getItem('cosight:pendingRequests');
                                        const latestPendings = latestPendingsRaw ? JSON.parse(latestPendingsRaw) : {};
                                        if (latestPendings[topic]) {
                                            latestPendings[topic].stillPending = false;
                                            localStorage.setItem('cosight:pendingRequests', JSON.stringify(latestPendings));
                                        }
                                    } catch (e) {
                                        console.warn('清除 pending 失败:', e);
                                    }
                                }
                                try { originalHandler(evt); } catch (e) { /* no-op */ }
                            };

                            // 只订阅一次（由 WebSocketService 内部去重订阅更佳）
                            WebSocketService.subscribe(topic, wrappedHandler);

                            // 仅当明确标记 stillPending===true 时才重发，避免刷新导致重复执行
                            if (item && item.stillPending === true) {
                                try {
                                    WebSocketService.sendMessage(topic, JSON.stringify(item.message));
                                } catch (e) {
                                    console.warn('重发 pending 消息失败:', e);
                                }
                            }
                        });
                    } catch (e) {
                        console.warn('恢复 pending 失败:', e);
                    }
                };
                // 如果已经连接，直接执行；否则等待连接事件
                if (WebSocketService && WebSocketService.isOpen) {
                    onWsConnected();
                } else if (WebSocketService && WebSocketService.websocketConnected) {
                    WebSocketService.websocketConnected.addEventListener('connected', onWsConnected, { once: true });
                }
            } catch (e) {
                console.warn('恢复本地状态失败:', e);
            }
        })();
    </script>
</body>

</html>
